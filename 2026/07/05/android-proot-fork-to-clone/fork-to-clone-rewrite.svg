<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="SIGSYS 后改道">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="52%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f3ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <path d="M 70 530 C 210 430, 330 610, 485 495 S 760 370, 910 480 1070 445, 1130 360" stroke="#14b8a6" stroke-width="16" opacity="0.10" fill="none" stroke-linecap="round"/>
  <rect x="38" y="36" width="1124" height="608" rx="32" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)" opacity="0.94"/>
  <text x="600" y="94" text-anchor="middle" font-size="34" font-weight="780" fill="#0f172a" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">SIGSYS 后改道</text>
  <text x="600" y="137" text-anchor="middle" font-size="18" font-weight="520" fill="#64748b" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">fork 被挡住时，修复要接回 child-event 路径</text>
  <rect x="150" y="260" width="220" height="160" rx="28" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
<text x="260" y="335" text-anchor="middle" font-size="36" font-weight="800" fill="#c2410c" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">fork</text>
<line x1="370" y1="340" x2="535" y2="340" stroke="#f97316" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="535" y="270" width="150" height="140" rx="26" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
<text x="610" y="330" text-anchor="middle" font-size="28" font-weight="800" fill="#b91c1c" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">SIGSYS</text>
<text x="610" y="365" text-anchor="middle" font-size="22" font-weight="650" fill="#b91c1c" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">拦截</text>
<path d="M515 415 C555 520 740 520 800 405" fill="none" stroke="#14b8a6" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<rect x="800" y="260" width="230" height="160" rx="28" fill="#ccfbf1" stroke="#14b8a6" stroke-width="2"/>
<text x="915" y="330" text-anchor="middle" font-size="36" font-weight="800" fill="#0f766e" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">clone</text>
<text x="915" y="368" text-anchor="middle" font-size="21" font-weight="650" fill="#0f766e" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">SIGCHLD</text>
<rect x="440" y="495" width="320" height="54" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
<text x="600" y="531" text-anchor="middle" font-size="22" font-weight="650" fill="#475569" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">不是绕过系统限制，而是把可恢复分支接回来</text>
</svg>
