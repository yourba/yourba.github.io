<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="构建发布工坊">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="52%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f3ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <path d="M 70 530 C 210 430, 330 610, 485 495 S 760 370, 910 480 1070 445, 1130 360" stroke="#14b8a6" stroke-width="16" opacity="0.10" fill="none" stroke-linecap="round"/>
  <rect x="38" y="36" width="1124" height="608" rx="32" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)" opacity="0.94"/>
  <text x="600" y="94" text-anchor="middle" font-size="34" font-weight="780" fill="#0f172a" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">构建发布工坊</text>
  <text x="600" y="137" text-anchor="middle" font-size="18" font-weight="520" fill="#64748b" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">不要只产出压缩包，还要交付可验证路径</text>
  <rect x="120" y="300" width="960" height="118" rx="34" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
<rect x="160" y="246" width="145" height="225" rx="26" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="3"/>
<text x="232" y="355" text-anchor="middle" font-size="29" font-weight="800" fill="#0ea5e9" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">源码</text>
<line x1="305" y1="360" x2="350" y2="360" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="360" y="246" width="145" height="225" rx="26" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/>
<text x="432" y="355" text-anchor="middle" font-size="29" font-weight="800" fill="#22c55e" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">构建</text>
<line x1="505" y1="360" x2="550" y2="360" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="560" y="246" width="145" height="225" rx="26" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
<text x="632" y="355" text-anchor="middle" font-size="29" font-weight="800" fill="#f59e0b" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">Release</text>
<line x1="705" y1="360" x2="750" y2="360" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="760" y="246" width="145" height="225" rx="26" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="3"/>
<text x="832" y="355" text-anchor="middle" font-size="29" font-weight="800" fill="#8b5cf6" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">镜像</text>
<line x1="905" y1="360" x2="950" y2="360" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="960" y="246" width="145" height="225" rx="26" fill="#fff1f2" stroke="#e11d48" stroke-width="3"/>
<text x="1032" y="355" text-anchor="middle" font-size="29" font-weight="800" fill="#e11d48" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">清单</text>
<text x="600" y="535" text-anchor="middle" font-size="24" font-weight="680" fill="#475569" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">构建侧一次交付包、索引、镜像和最终清单</text>
</svg>
