<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="Planner 状态板">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0ea5e9"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="52%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <path d="M 70 530 C 210 430, 330 610, 485 495 S 760 370, 910 480 1070 445, 1130 360" stroke="#22c55e" stroke-width="16" opacity="0.10" fill="none" stroke-linecap="round"/>
  <rect x="38" y="36" width="1124" height="608" rx="32" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)" opacity="0.94"/>
  <text x="600" y="94" text-anchor="middle" font-size="34" font-weight="780" fill="#0f172a" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">Planner 状态板</text>
  <text x="600" y="137" text-anchor="middle" font-size="18" font-weight="520" fill="#64748b" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">安装前先算清楚，不要边下边猜</text>
  <rect x="110" y="220" width="980" height="330" rx="32" fill="#f8fafc" stroke="#cbd5e1" stroke-width="3"/>
<rect x="145" y="270" width="150" height="190" rx="24" fill="#ffffff" stroke="#14b8a6" stroke-width="3"/>
<circle cx="220" cy="325" r="28" fill="#ccfbf1" stroke-width="2"/>
<text x="220" y="385" text-anchor="middle" font-size="28" font-weight="800" fill="#172033" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">选择</text>
<text x="220" y="425" text-anchor="middle" font-size="17" font-weight="520" fill="#64748b" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">entry</text>
<rect x="335" y="270" width="150" height="190" rx="24" fill="#ffffff" stroke="#0ea5e9" stroke-width="3"/>
<circle cx="410" cy="325" r="28" fill="#e0f2fe" stroke-width="2"/>
<text x="410" y="385" text-anchor="middle" font-size="28" font-weight="800" fill="#172033" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">索引</text>
<text x="410" y="425" text-anchor="middle" font-size="17" font-weight="520" fill="#64748b" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">Packages.xz</text>
<rect x="525" y="270" width="150" height="190" rx="24" fill="#ffffff" stroke="#8b5cf6" stroke-width="3"/>
<circle cx="600" cy="325" r="28" fill="#ede9fe" stroke-width="2"/>
<text x="600" y="385" text-anchor="middle" font-size="28" font-weight="800" fill="#172033" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">依赖</text>
<text x="600" y="425" text-anchor="middle" font-size="17" font-weight="520" fill="#64748b" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">Depends</text>
<rect x="715" y="270" width="150" height="190" rx="24" fill="#ffffff" stroke="#f59e0b" stroke-width="3"/>
<circle cx="790" cy="325" r="28" fill="#fef3c7" stroke-width="2"/>
<text x="790" y="385" text-anchor="middle" font-size="28" font-weight="800" fill="#172033" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">跳过</text>
<text x="790" y="425" text-anchor="middle" font-size="17" font-weight="520" fill="#64748b" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">已安装</text>
<rect x="905" y="270" width="150" height="190" rx="24" fill="#ffffff" stroke="#22c55e" stroke-width="3"/>
<circle cx="980" cy="325" r="28" fill="#dcfce7" stroke-width="2"/>
<text x="980" y="385" text-anchor="middle" font-size="28" font-weight="800" fill="#172033" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">输出</text>
<text x="980" y="425" text-anchor="middle" font-size="17" font-weight="520" fill="#64748b" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">脚本</text>
<text x="600" y="512" text-anchor="middle" font-size="23" font-weight="680" fill="#475569" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">Planner 只产出计划，Installer 才进入终端</text>
</svg>
