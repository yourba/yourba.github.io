<text x="810" y="416" text-anchor="middle" font-size="25" font-weight="800" fill="#172033" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">安装</text>
<text x="810" y="450" text-anchor="middle" font-size="15" font-weight="520" fill="#64748b" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">dpkg</text>
<path d="M867 422 C910 392, 925 322, 960 322" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<circle cx="1015" cy="350" r="58" fill="#fff1f2" stroke="#e11d48" stroke-width="3"/>
<text x="1015" y="344" text-anchor="middle" font-size="25" font-weight="800" fill="#172033" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">记录</text>
<text x="1015" y="378" text-anchor="middle" font-size="15" font-weight="520" fill="#64748b" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">状态</text>
<text x="600" y="545" text-anchor="middle" font-size="23" font-weight="680" fill="#475569" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">轻量 resolver 不追求 apt 全家桶，只把安装计划算准</text>
