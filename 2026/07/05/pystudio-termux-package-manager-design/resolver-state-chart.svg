<text x="195" y="378" text-anchor="middle" font-size="15" font-weight="520" fill="#64748b" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">Packages.xz</text>
<path d="M252 350 C295 320, 310 372, 345 372" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
