<circle cx="605" cy="350" r="58" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/>
<text x="605" y="344" text-anchor="middle" font-size="25" font-weight="800" fill="#172033" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">校验</text>
<text x="605" y="378" text-anchor="middle" font-size="15" font-weight="520" fill="#64748b" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">SHA256</text>
<path d="M662 350 C705 320, 720 372, 755 372" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
