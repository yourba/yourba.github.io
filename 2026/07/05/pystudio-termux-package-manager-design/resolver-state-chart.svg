  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <path d="M 70 530 C 210 430, 330 610, 485 495 S 760 370, 910 480 1070 445, 1130 360" stroke="#f97316" stroke-width="16" opacity="0.10" fill="none" stroke-linecap="round"/>
