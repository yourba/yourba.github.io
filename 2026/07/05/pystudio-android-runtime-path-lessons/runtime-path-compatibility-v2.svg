670" font-family="Inter, 'Microsoft YaHei', 'Noto Sans SC', sans-serif" font-size="17" font-weight="700" fill="#c95b6c" text-anchor="start" opacity="1" letter-spacing="0">结论：兼容不是“路径字符串相同”，而是目录所有权与挂载边界一致。</text></svg>