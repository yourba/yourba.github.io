<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="两类包，两种处理">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef2f2"/>
      <stop offset="52%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff7ed"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <path d="M 70 530 C 210 430, 330 610, 485 495 S 760 370, 910 480 1070 445, 1130 360" stroke="#06b6d4" stroke-width="16" opacity="0.10" fill="none" stroke-linecap="round"/>
  <rect x="38" y="36" width="1124" height="608" rx="32" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)" opacity="0.94"/>
  <text x="600" y="94" text-anchor="middle" font-size="34" font-weight="780" fill="#0f172a" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">两类包，两种处理</text>
  <text x="600" y="137" text-anchor="middle" font-size="18" font-weight="520" fill="#64748b" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">不要每次启动 shell 都全目录扫描</text>
  <rect x="120" y="220" width="420" height="300" rx="34" fill="#ecfeff" stroke="#06b6d4" stroke-width="3"/>
<rect x="660" y="220" width="420" height="300" rx="34" fill="#fff7ed" stroke="#f97316" stroke-width="3"/>
<text x="330" y="290" text-anchor="middle" font-size="35" font-weight="800" fill="#0891b2" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">自家 .deb</text>
<text x="330" y="350" text-anchor="middle" font-size="29" font-weight="680" fill="#0f172a" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">构建期修补</text>
<text x="330" y="412" text-anchor="middle" font-size="22" font-weight="520" fill="#64748b" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">安装后安静可用</text>
<text x="870" y="290" text-anchor="middle" font-size="35" font-weight="800" fill="#c2410c" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">npm / pip</text>
<text x="870" y="350" text-anchor="middle" font-size="29" font-weight="680" fill="#0f172a" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">运行期兼容</text>
<text x="870" y="412" text-anchor="middle" font-size="22" font-weight="520" fill="#64748b" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">只处理新增产物</text>
<line x1="560" y1="370" x2="640" y2="370" stroke="#cbd5e1" stroke-width="5" stroke-linecap="round" stroke-dasharray="12 12"/>
<text x="600" y="555" text-anchor="middle" font-size="24" font-weight="680" fill="#475569" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">能控制的在构建侧修，动态装出来的交给兼容层</text>
</svg>
