<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="LSP 接入面板">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0ea5e9"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="52%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <path d="M 70 530 C 210 430, 330 610, 485 495 S 760 370, 910 480 1070 445, 1130 360" stroke="#22c55e" stroke-width="16" opacity="0.10" fill="none" stroke-linecap="round"/>
  <rect x="38" y="36" width="1124" height="608" rx="32" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)" opacity="0.94"/>
  <text x="600" y="94" text-anchor="middle" font-size="34" font-weight="780" fill="#0f172a" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">LSP 接入面板</text>
  <text x="600" y="137" text-anchor="middle" font-size="18" font-weight="520" fill="#64748b" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">启动、握手、同步、映射，每一步都要可观察</text>
  <rect x="120" y="245" width="245" height="240" rx="32" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="3"/>
<text x="242" y="340" text-anchor="middle" font-size="35" font-weight="800" fill="#6d28d9" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">Editor</text>
<text x="242" y="388" text-anchor="middle" font-size="23" font-weight="560" fill="#6d28d9" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">文档同步</text>
<rect x="470" y="255" width="260" height="220" rx="32" fill="#ecfeff" stroke="#06b6d4" stroke-width="3"/>
<text x="600" y="335" text-anchor="middle" font-size="35" font-weight="800" fill="#0891b2" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">bridge</text>
<text x="600" y="382" text-anchor="middle" font-size="23" font-weight="560" fill="#0891b2" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">JSON-RPC</text>
<rect x="835" y="245" width="245" height="240" rx="32" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/>
<text x="958" y="335" text-anchor="middle" font-size="35" font-weight="800" fill="#15803d" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">Server</text>
<text x="958" y="382" text-anchor="middle" font-size="23" font-weight="560" fill="#15803d" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">诊断 / 补全</text>
<line x1="365" y1="365" x2="470" y2="365" stroke="#8b5cf6" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="730" y1="365" x2="835" y2="365" stroke="#06b6d4" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="305" y="515" width="590" height="58" rx="18" fill="#f8fafc" stroke="#dbe5ef" stroke-width="2"/>
<text x="600" y="552" text-anchor="middle" font-size="23" font-weight="680" fill="#475569" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">安装命令只是开始，握手和结果映射才是集成</text>
</svg>
