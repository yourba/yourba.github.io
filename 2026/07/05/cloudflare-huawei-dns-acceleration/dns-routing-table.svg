<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="两条线路，两种职责">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e11d48"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="52%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff1f2"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <path d="M 70 530 C 210 430, 330 610, 485 495 S 760 370, 910 480 1070 445, 1130 360" stroke="#0ea5e9" stroke-width="16" opacity="0.10" fill="none" stroke-linecap="round"/>
  <rect x="38" y="36" width="1124" height="608" rx="32" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)" opacity="0.94"/>
  <text x="600" y="94" text-anchor="middle" font-size="34" font-weight="780" fill="#0f172a" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">两条线路，两种职责</text>
  <text x="600" y="137" text-anchor="middle" font-size="18" font-weight="520" fill="#64748b" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">用线路记录表达策略，不在 App 里硬猜</text>
  <rect x="155" y="230" width="405" height="250" rx="32" fill="#f0f9ff" stroke="#38bdf8" stroke-width="3"/>
<rect x="640" y="230" width="405" height="250" rx="32" fill="#fff1f2" stroke="#fb7185" stroke-width="3"/>
<text x="358" y="292" text-anchor="middle" font-size="34" font-weight="800" fill="#0284c7" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">全网默认</text>
<text x="358" y="352" text-anchor="middle" font-size="28" font-weight="680" fill="#0f172a" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">Pages 兜底</text>
<text x="358" y="402" text-anchor="middle" font-size="22" font-weight="520" fill="#64748b" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">稳定优先</text>
<text x="842" y="292" text-anchor="middle" font-size="34" font-weight="800" fill="#be123c" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">中国大陆</text>
<text x="842" y="352" text-anchor="middle" font-size="28" font-weight="680" fill="#0f172a" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">优选入口</text>
<text x="842" y="402" text-anchor="middle" font-size="22" font-weight="520" fill="#64748b" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">速度优先</text>
<rect x="210" y="515" width="780" height="52" rx="18" fill="#f8fafc" stroke="#dbe5ef" stroke-width="2"/>
<text x="600" y="550" text-anchor="middle" font-size="22" font-weight="680" fill="#475569" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">两条 CNAME 线路共存，默认线路负责兜底</text>
<line x1="560" y1="355" x2="640" y2="355" stroke="#cbd5e1" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 12"/>
</svg>
