<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="运行按钮的旅程">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef2f2"/>
      <stop offset="52%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff7ed"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <path d="M 70 530 C 210 430, 330 610, 485 495 S 760 370, 910 480 1070 445, 1130 360" stroke="#06b6d4" stroke-width="16" opacity="0.10" fill="none" stroke-linecap="round"/>
  <rect x="38" y="36" width="1124" height="608" rx="32" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)" opacity="0.94"/>
  <text x="600" y="94" text-anchor="middle" font-size="34" font-weight="780" fill="#0f172a" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">运行按钮的旅程</text>
  <text x="600" y="137" text-anchor="middle" font-size="18" font-weight="520" fill="#64748b" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">一次点击，变成可复查的终端会话</text>
  <path d="M150 390 C280 210 430 390 560 360 S820 210 1010 380" fill="none" stroke="#0ea5e9" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
<rect x="130" y="485" width="940" height="70" rx="22" fill="#f8fafc" stroke="#dbe5ef" stroke-width="2"/>
<text x="600" y="529" text-anchor="middle" font-size="24" font-weight="680" fill="#334155" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">运行不是偷用当前 shell，而是一次可追踪的终端旅程</text>
<circle cx="160" cy="380" r="42" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="3"/>
<text x="160" y="388" text-anchor="middle" font-size="26" font-weight="800" fill="#0ea5e9" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">1</text>
<text x="160" y="454" text-anchor="middle" font-size="24" font-weight="720" fill="#172033" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">保存</text>
<circle cx="360" cy="300" r="42" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="3"/>
<text x="360" y="308" text-anchor="middle" font-size="26" font-weight="800" fill="#0ea5e9" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">2</text>
<text x="360" y="374" text-anchor="middle" font-size="24" font-weight="720" fill="#172033" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">检查</text>
<circle cx="570" cy="370" r="42" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="3"/>
<text x="570" y="378" text-anchor="middle" font-size="26" font-weight="800" fill="#0ea5e9" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">3</text>
<text x="570" y="444" text-anchor="middle" font-size="24" font-weight="720" fill="#172033" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">新会话</text>
<circle cx="790" cy="290" r="42" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="3"/>
<text x="790" y="298" text-anchor="middle" font-size="26" font-weight="800" fill="#0ea5e9" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">4</text>
<text x="790" y="364" text-anchor="middle" font-size="24" font-weight="720" fill="#172033" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">输出</text>
<circle cx="1010" cy="380" r="42" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="3"/>
<text x="1010" y="388" text-anchor="middle" font-size="26" font-weight="800" fill="#0ea5e9" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">5</text>
<text x="1010" y="454" text-anchor="middle" font-size="24" font-weight="720" fill="#172033" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">返回</text>
</svg>
