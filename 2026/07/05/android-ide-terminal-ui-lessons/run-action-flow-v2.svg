<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720"><defs><filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#06121a" flood-opacity=".18"/></filter><marker id="a" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 0L14 7L0 14Z" fill="#15b8b0"/></marker><marker id="ad" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 0L14 7L0 14Z" fill="#23384c"/></marker></defs><rect x="0" y="0" width="1200" height="720" rx="0" fill="#0b1720" stroke="none" stroke-width="0" opacity="1" /><text x="52" y="58" font-family="Inter, 'Microsoft YaHei', 'Noto Sans SC', sans-serif" font-size="28" font-weight="820" fill="#f4f7f7" text-anchor="start" opacity="1" letter-spacing="0">Run 动作是一条事件轨迹</text><text x="52" y="88" font-family="Inter, 'Microsoft YaHei', 'Noto Sans SC', sans-serif" font-size="15" font-weight="520" fill="#91a6ae" text-anchor="start" opacity="1" letter-spacing="0">从触摸事件到 shell 命令，逐层记录边界与返回值</text><line x1="52" y1="108" x2="1148" y2="108" stroke="#8ee85d" stroke-width="3" opacity="1" /><text x="150" y="150" font-family="Inter, 'Microsoft YaHei', 'Noto Sans SC', sans-serif" font-size="18" font-weight="750" fill="#9ed0d7" text-anchor="middle" opacity="1" letter-spacing="0">Touch</text><line x1="150" y1="172" x2="150" y2="650" stroke="#36515d" stroke-width="2" opacity="1" stroke-dasharray="7 10" /><text x="410" y="150" font-family="Inter, 'Microsoft YaHei', 'Noto Sans SC', sans-serif" font-size="18" font-weight="750" fill="#9ed0d7" text-anchor="middle" opacity="1" letter-spacing="0">ViewModel</text><line x1="410" y1="172" x2="410" y2="650" stroke="#36515d" stroke-width="2" opacity="1" stroke-dasharray="7 10" /><text x="670" y="150" font-family="Inter, 'Microsoft YaHei', 'Noto Sans SC', sans-serif" font-size="18" font-weight="750" fill="#9ed0d7" text-anchor="middle" opacity="1" letter-spacing="0">Session</text><line x1="670" y1="172" x2="670" y2="650" stroke="#36515d" stroke-width="2" opacity="1" stroke-dasharray="7 10" /><text x="930" y="150" font-family="Inter, 'Microsoft YaHei', 'Noto Sans SC', sans-serif" font-size="18" font-weight="750" fill="#9ed0d7" text-anchor="middle" opacity="1" letter-spacing="0">Shell / PTY</text><line x1="930" y1="172" x2="930" y2="650" stroke="#36515d" stroke-width="2" opacity="1" stroke-dasharray="7 10" /><line x1="150" y1="205" x2="410" y2="205" stroke="#ff687a" stroke-width="4" opacity="1" marker-end="url(#a)"/><circle cx="150" cy="205" r="7" fill="#ff687a" stroke="none" stroke-width="0" opacity="1" /><text x="280.0" y="190" font-family="Inter, 'Microsoft YaHei', 'Noto Sans SC', sans-serif" font-size="17" font-weight="700" fill="#ff687a" text-anchor="middle" opacity="1" letter-spacing="0">onClick()</text><line x1="410" y1="285" x2="670" y2="285" stroke="#8ee85d" stroke-width="4" opacity="1" marker-end="url(#a)"/><circle cx="410" cy="285" r="7" fill="#8ee85d" stroke="none" stroke-width="0" opacity="1" /><text x="540.0" y="270" font-family="Inter, 'Microsoft YaHei', 'Noto Sans SC', sans-serif" font-size="17" font-weight="700" fill="#8ee85d" text-anchor="middle" opacity="1" letter-spacing="0">run(command)</text><line x1="670" y1="370" x2="930" y2="370" stroke="#36d0cc" stroke-width="4" opacity="1" marker-end="url(#a)"/><circle cx="670" cy="370" r="7" fill="#36d0cc" stroke="none" stroke-width="0" opacity="1" /><text x="800.0" y="355" font-family="Inter, 'Microsoft YaHei', 'Noto Sans SC', sans-serif" font-size="17" font-weight="700" fill="#36d0cc" text-anchor="middle" opacity="1" letter-spacing="0">write(bytes)</text><line x1="930" y1="475" x2="670" y2="475" stroke="#f7c85e" stroke-width="4" opacity="1" /><circle cx="930" cy="475" r="7" fill="#f7c85e" stroke="none" stroke-width="0" opacity="1" /><text x="800.0" y="460" font-family="Inter, 'Microsoft YaHei', 'Noto Sans SC', sans-serif" font-size="17" font-weight="700" fill="#f7c85e" text-anchor="middle" opacity="1" letter-spacing="0">exitCode = 0</text><line x1="670" y1="565" x2="410" y2="565" stroke="#36d0cc" stroke-width="4" opacity="1" /><circle cx="670" cy="565" r="7" fill="#36d0cc" stroke="none" stroke-width="0" opacity="1" /><text x="540.0" y="550" font-family="Inter, 'Microsoft YaHei', 'Noto Sans SC', sans-serif" font-size="17" font-weight="700" fill="#36d0cc" text-anchor="middle" opacity="1" letter-spacing="0">state = finished</text><rect x="82" y="610" width="1035" height="66" rx="8" fill="#132833" stroke="#36515d" stroke-width="2" opacity="1" /><text x="600" y="652" font-family="Inter, 'Microsoft YaHei', 'Noto Sans SC', sans-serif" font-size="18" font-weight="650" fill="#dce9ec" text-anchor="middle" opacity="1" letter-spacing="0">每一层都可记录、可取消、可重试；不要让按钮直接拼 shell 字符串</text></svg>